version: 2
# Keep routine updates small enough to review. Runtime and major-version
# migrations stay manual; Dependabot security updates are still created.
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      react-runtime:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
        update-types:
          - minor
          - patch
      frontend-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "@supabase/*"
          - "react"
          - "react-dom"
          - "framer-motion"
        update-types:
          - minor
          - patch
    allow:
      - dependency-type: direct
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    # Supabase JS 2.110+ requires Node 22. Remove this ceiling with the
    # planned Node 22 runtime migration.
    ignore:
      - dependency-name: "@supabase/supabase-js"
        versions:
          - ">=2.110.0"
    labels:
      - dependencies
      - area:frontend

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    versioning-strategy: increase-if-necessary
    groups:
      backend-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    allow:
      - dependency-type: direct
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    labels:
      - dependencies
      - area:backend

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    allow:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    labels:
      - dependencies
      - area:ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      runtime-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - patch
    allow:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
    labels:
      - dependencies
      - area:ci
