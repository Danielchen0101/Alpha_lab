changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking changes
      labels:
        - breaking-change
        - semver:major
    - title: Product and research workflow
      labels:
        - enhancement
    - title: Fixes
      labels:
        - bug
    - title: Security
      labels:
        - security
    - title: Documentation
      labels:
        - documentation
    - title: Dependencies and maintenance
      labels:
        - dependencies
        - area:ci
    - title: Other changes
      labels:
        - "*"
