name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    
    - name: Setup Node.js
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --watchAll=false
    
    - name: Build frontend
      run: |
        cd frontend
        npm run build

  test-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    
    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Run backend tests
      run: |
        cd backend
        python -m pytest -v
    
    - name: Lint Python code
      run: |
        pip install flake8 black
        cd backend
        flake8 start_quant_backend.py config.py technical_indicators.py --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check start_quant_backend.py config.py technical_indicators.py || echo "Black formatting report is advisory for legacy files"

  test-e2e:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Setup Node.js
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Install Chromium
      working-directory: frontend
      run: npx playwright install --with-deps chromium

    - name: Run public and authentication smoke tests
      working-directory: frontend
      run: npm run test:e2e

  lint-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    
    - name: Setup Node.js
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Run ESLint
      run: |
        cd frontend
        npx eslint src/ --ext .js,.jsx,.ts,.tsx
    
    - name: Check TypeScript
      run: |
        cd frontend
        npx tsc --noEmit

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Setup Node.js
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.11'
    
    - name: Enforce frontend high and critical dependency audit
      working-directory: frontend
      # Known build-tool findings should be fixed with a package override or a
      # time-bounded, reviewed security exception; new findings fail this job.
      run: npm audit --package-lock-only --audit-level=high
    
    - name: Audit backend dependencies
      run: |
        pip install pip-audit
        pip-audit -r backend/requirements.txt

  secret-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Reject credentials and provider tokens in the release tree
      uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.0
      with:
        args: dir /github/workspace --config /github/workspace/.gitleaks.toml --redact --no-banner --exit-code 1

  validate-docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

    - name: Build production image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: alphalab:ci
        build-args: |
          REACT_APP_API_BASE_URL=/api
          REACT_APP_SUPABASE_URL=https://example.supabase.co
          REACT_APP_SUPABASE_ANON_KEY=ci-public-placeholder
          REACT_APP_TURNSTILE_SITE_KEY=ci-public-placeholder

  build-docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-frontend, test-backend, test-e2e, lint-frontend, security-scan, secret-scan, validate-docker]
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    
    - name: Set up Docker Buildx
      if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
    
    - name: Login to DockerHub
      if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}
    
    - name: Build and push
      if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/quant-trading-platform:latest
          ${{ env.DOCKER_USERNAME }}/quant-trading-platform:${{ github.sha }}
    
    - name: Skip Docker build when secrets are missing
      if: env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == ''
      run: echo "Skipping Docker build because DOCKER_USERNAME or DOCKER_PASSWORD is not set."
