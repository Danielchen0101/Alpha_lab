<!DOCTYPE html>
<html>
<head>
    <title>数据链路验证测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .code { background: #f5f5f5; padding: 10px; border-radius: 3px; font-family: monospace; }
        button { margin: 5px; padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #console { background: #000; color: #0f0; padding: 10px; height: 300px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <h1>数据链路验证测试</h1>
    
    <div class="section">
        <h2>1. 模拟用户操作</h2>
        <button onclick="startPaperTrading()">Start Paper Trading</button>
        <button onclick="addTrade()">添加交易 (BUY AAPL)</button>
        <button onclick="stopPaperTrading()">Stop Paper Trading</button>
    </div>
    
    <div class="section">
        <h2>2. Console 输出</h2>
        <div id="console"></div>
    </div>
    
    <div class="section">
        <h2>3. localStorage 验证</h2>
        <button onclick="checkLocalStorage()">检查 localStorage</button>
        <div id="localStorageResult"></div>
    </div>
    
    <div class="section">
        <h2>4. 页面模块验证</h2>
        <div id="moduleResults"></div>
    </div>
    
    <script>
        // 模拟 console.log
        function log(message) {
            const consoleDiv = document.getElementById('console');
            const line = document.createElement('div');
            line.textContent = '> ' + message;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
        
        // 模拟 localStorage
        const SESSION_HISTORY_KEY = 'quant_session_history';
        let sessionActive = false;
        let trades = [];
        let sessionStartTime = null;
        
        // 1. Start Paper Trading
        function startPaperTrading() {
            sessionActive = true;
            sessionStartTime = new Date().toISOString();
            trades = [];
            log('✅ Start Paper Trading');
            log(`   开始时间: ${sessionStartTime}`);
        }
        
        // 2. 添加交易
        function addTrade() {
            if (!sessionActive) {
                log('❌ 请先 Start Paper Trading');
                return;
            }
            
            const trade = {
                id: 'trade_' + Date.now(),
                timestamp: new Date().toISOString(),
                symbol: 'AAPL',
                action: 'BUY',
                shares: 10,
                price: 175.50,
                slippageAmount: 1.75,
                commission: 8.78
            };
            
            trades.push(trade);
            log(`✅ 添加交易: ${trade.action} ${trade.shares} shares of ${trade.symbol} at $${trade.price}`);
        }
        
        // 3. Stop Paper Trading
        function stopPaperTrading() {
            if (!sessionActive) {
                log('❌ 没有活跃的 session');
                return;
            }
            
            const endTime = new Date().toISOString();
            log('✅ Stop Paper Trading');
            log(`   结束时间: ${endTime}`);
            log(`   总交易数: ${trades.length}`);
            
            if (trades.length === 0) {
                log('⚠️ 没有交易，session 不会被保存');
                sessionActive = false;
                return;
            }
            
            // 创建 history item
            const startEquity = 10000;
            const totalSlippage = trades.reduce((sum, trade) => sum + Math.abs(trade.slippageAmount), 0);
            const totalCommission = trades.reduce((sum, trade) => sum + Math.abs(trade.commission), 0);
            const endEquity = startEquity + 250; // 模拟盈利
            const returnPct = ((endEquity - startEquity) / startEquity) * 100;
            
            const historyItem = {
                id: `session_${Date.now()}_0`,
                timestamp: endTime,
                strategyMode: 'MA_CROSSOVER',
                symbol: 'AAPL',
                shortMaPeriod: 5,
                longMaPeriod: 10,
                slippageRate: 0.001,
                commissionRate: 0.005,
                startEquity: startEquity,
                endEquity: endEquity,
                returnPct: returnPct,
                totalTrades: trades.length,
                realizedPnL: 250,
                totalSlippage: totalSlippage,
                totalCommission: totalCommission,
                durationMinutes: 5
            };
            
            // 保存到 localStorage
            const existing = JSON.parse(localStorage.getItem(SESSION_HISTORY_KEY) || '[]');
            const newHistory = [historyItem, ...existing].slice(0, 10);
            localStorage.setItem(SESSION_HISTORY_KEY, JSON.stringify(newHistory));
            
            // Debug 日志
            log('✅ console.log("Saved session:", historyItem)');
            log(`   Saved session: ${JSON.stringify({
                id: historyItem.id,
                symbol: historyItem.symbol,
                returnPct: historyItem.returnPct.toFixed(2) + '%',
                totalTrades: historyItem.totalTrades,
                durationMinutes: historyItem.durationMinutes + 'm'
            })}`);
            
            log('✅ console.log("All history:", limitedHistory)');
            log(`   All history: ${JSON.stringify(newHistory.map(item => ({
                id: item.id,
                symbol: item.symbol,
                returnPct: item.returnPct.toFixed(2) + '%',
                trades: item.totalTrades
            })))}`);
            
            sessionActive = false;
        }
        
        // 4. 检查 localStorage
        function checkLocalStorage() {
            const savedData = localStorage.getItem(SESSION_HISTORY_KEY);
            const resultDiv = document.getElementById('localStorageResult');
            
            if (!savedData) {
                resultDiv.innerHTML = '<div class="error">❌ localStorage 中没有数据</div>';
                return;
            }
            
            const parsed = JSON.parse(savedData);
            resultDiv.innerHTML = `
                <div class="success">✅ localStorage 中有数据！共 ${parsed.length} 条记录</div>
                <div class="code">${JSON.stringify(parsed, null, 2)}</div>
            `;
        }
        
        // 5. 验证页面模块
        function verifyModules() {
            const savedData = localStorage.getItem(SESSION_HISTORY_KEY);
            const modulesDiv = document.getElementById('moduleResults');
            
            if (!savedData) {
                modulesDiv.innerHTML = '<div class="error">❌ 没有数据，所有模块都为空</div>';
                return;
            }
            
            const parsed = JSON.parse(savedData);
            modulesDiv.innerHTML = `
                <div class="success">✅ 数据链路验证结果：</div>
                <ul>
                    <li><strong>Session History</strong>: ${parsed.length > 0 ? '✅ 显示真实数据' : '❌ 空状态'}</li>
                    <li><strong>Session Insights</strong>: ${parsed.length > 0 ? '✅ 显示真实数据' : '❌ 空状态'}</li>
                    <li><strong>Experiment Ranking</strong>: ${parsed.length > 0 ? '✅ 显示排名数据' : '❌ 空状态'}</li>
                    <li><strong>Preset Performance Summary</strong>: ${parsed.length > 0 ? '✅ 显示汇总数据' : '❌ 空状态'}</li>
                </ul>
                <div>最新 session: ${parsed[0]?.symbol} - ${parsed[0]?.returnPct?.toFixed(2)}% (${parsed[0]?.totalTrades} trades)</div>
            `;
        }
        
        // 自动验证
        window.onload = function() {
            log('=== 数据链路验证测试开始 ===');
            log('请按顺序执行：');
            log('1. 点击 "Start Paper Trading"');
            log('2. 点击 "添加交易" 至少2次');
            log('3. 点击 "Stop Paper Trading"');
            log('4. 点击 "检查 localStorage"');
            log('');
            
            // 初始验证
            verifyModules();
        };
        
        // 每次操作后自动验证
        const originalStop = stopPaperTrading;
        stopPaperTrading = function() {
            originalStop();
            setTimeout(() => {
                verifyModules();
            }, 100);
        };
        
        const originalCheck = checkLocalStorage;
        checkLocalStorage = function() {
            originalCheck();
            verifyModules();
        };
    </script>
</body>
</html>
