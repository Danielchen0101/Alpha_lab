[extend]
useDefault = true

[[allowlists]]
description = "Ignore the Settings service-status ternary, which the Finnhub rule mistakes for a token assignment."
targetRules = ["finnhub-access-token"]
condition = "AND"
regexTarget = "line"
paths = ['''frontend/src/pages/Settings\.tsx$''']
regexes = ['''finnhub:\s*marketDataConfigured\s*\?\s*['"]connected['"]\s*:\s*providerStatusToServiceStatus\(result\.data\.finnhub\?\.status\),''']

[[allowlists]]
description = "Ignore stable Kalshi navigation identifiers that resemble generic API keys."
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "line"
paths = ['''frontend/src/components/AuthenticatedShell\.tsx$''']
regexes = ['''key:\s*['"]kalshi-btc15-(?:market|bot)['"]''']
